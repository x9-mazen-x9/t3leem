version: "3.9"

services:
  web:
    build: .
    command: >
      sh -c "gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      -w ${GUNICORN_WORKERS:-$(python -c 'import multiprocessing as m; print(m.cpu_count()*2+1)')}
      --threads ${GUNICORN_THREADS:-2}
      --timeout 60
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 200"
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_edu_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  celery:
    build: .
    command: >
      sh -c "celery -A config worker -l info
      --concurrency ${CELERY_WORKER_CONCURRENCY:-4}
      --prefetch-multiplier 1
      -O fair"
    env_file:
      - .env
    depends_on:
      - db
      - redis
  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  db_data:
  static_volume:

